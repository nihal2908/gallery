name: gallery
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  photo_manager: ^3.8.3
  photo_manager_image_provider: ^2.2.0
  get_it: ^9.2.0
  photo_view: ^0.15.0
  share_plus: ^12.0.1
  video_player: ^2.10.1
  pro_image_editor: ^11.21.2
  pdf: ^3.11.3
  path_provider: ^2.1.5
  chewie: ^1.13.0
  sqflite: ^2.4.2
  uuid: ^4.5.2
  path: ^1.9.1
  flutter_secure_storage: ^10.0.0
  screen_protector: ^1.5.1
  shared_preferences: ^2.5.4
  encrypt: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
